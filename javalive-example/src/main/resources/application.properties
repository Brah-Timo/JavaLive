# ============================================================
# JavaLive Example Application — application.properties
# ============================================================

spring.application.name=javalive-example
server.port=8080

# ── H2 In-Memory Database ─────────────────────────────────
spring.datasource.url=jdbc:h2:mem:javalive;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── WebSocket ─────────────────────────────────────────────
spring.websocket.max-text-message-size=524288
spring.websocket.max-binary-message-size=524288

# ── JavaLive ──────────────────────────────────────────────
javalive.enabled=true
javalive.dev.debug=true

# ── Logging ───────────────────────────────────────────────
logging.level.io.javalive=DEBUG
logging.level.com.example=DEBUG
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN
